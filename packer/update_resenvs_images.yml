---
- name: Update ResEnv image
  hosts: localhost
  vars:
    resenv: rstudio
    location: bielefeld
    upload_environment: staging
  vars_files:
    - tags.json
    - networks.json

  tasks:
    - name: Set Update Fact to false
      ansible.builtin.set_fact:
        update: false

    - name: Retrieve list of all images
      openstack.cloud.image_info:
      register: images

    - name: Get Latest Master Branch Commit
      ansible.builtin.command: git rev-parse --short --verify origin/master
      register: github_hash
      changed_when: false

    - name: Get md5 Hash from resenv folder
      ansible.builtin.shell: set -o pipefail &&  find ../generic ../{{ resenv }} -type f -exec md5sum {} \; | md5sum
      register: md5_hash
      args:
        executable: /bin/bash
      changed_when: false

    - name: Include {{ resenv }} metadata
      ansible.builtin.command: cat ../{{ resenv }}/{{ resenv }}_metadata.yml
      register: resenv_metadata
      changed_when: false

    - name: Generate JSON from  {{ resenv }} metadata
      ansible.builtin.copy:
        content: "{{ resenv_metadata.stdout | from_yaml | to_json }}"
        dest: ./{{ resenv }}_metadata.json

    - name: Convert non string json_metadata values to string
      ansible.builtin.script: ../packer/convert_json_values_to_string.py --file ./{{ resenv }}_metadata.json
      args:
        executable: python3

    - name: Set Base Images
      ansible.builtin.set_fact:
        base_images: "{{ images.images
          | selectattr('tags', 'search', base_image_tag)
          | selectattr('os_distro', '==', os_distro)
          | selectattr('os_version', '==', os_version)
          | sort(attribute='created_at') }}"

    - name: Set latest base image name
      ansible.builtin.set_fact:
        latest_base_image_name: "{{ (base_images | last).name }}"

    - name: Set Resenv Images
      ansible.builtin.set_fact:
        resenv_images: "{{ images.images
          | selectattr('tags', 'search', lookup('vars', resenv + '_tag'))
          | selectattr('os_distro', '==', os_distro)
          | selectattr('os_version', '==', os_version)
          | rejectattr('tags', 'search', 'cluster')
          | sort(attribute='created_at') }}"
    - name: Set Update facts
      ansible.builtin.set_fact:
        update: true
      when:
        - base_images | length > 0
        - resenv_images | length == 0
          or (
          (
          (base_images | last).created_at | to_datetime('%Y-%m-%dT%H:%M:%SZ')
          ) >
          (
          (resenv_images | last).created_at | to_datetime('%Y-%m-%dT%H:%M:%SZ')
          )
          )
          or (
          resenv_images | length > 0 and
          ((resenv_images | last).properties.md5_hash | trim | default('undefined')) != (md5_hash.stdout | trim)
          )

    - name: Build new {{ resenv }} image - {{ os_distro }} {{ os_version }}
      ansible.builtin.command: >
        packer build
          -var-file=tags.json
          -var-file=./{{ resenv }}_metadata.json
          -var "os_distro={{ os_distro }}"
          -var "os_version={{ os_version }}"
          -var "network={{ lookup('vars', location + '_' + upload_environment) }}"
          -var "md5_hash={{ md5_hash.stdout }}"
          -var "github_hash={{ github_hash.stdout }}"
          -var "github_token={{ lookup('env', 'GITHUB_REPO_TOKEN') }}"
          -var "source_image_name={{ latest_base_image_name }}"
          ../{{ resenv }}/packer_{{ lookup('vars', resenv + '_tag') }}.json
      when: update
      changed_when: false

    - name: Refresh image list after build
      openstack.cloud.image_info:
      register: images_after_build
      when: update

    - name: Get newest resenv image
      ansible.builtin.set_fact:
        newest_resenv_image: "{{ images_after_build.images
          | selectattr('tags', 'search', lookup('vars', resenv + '_tag'))
          | selectattr('os_distro', '==', os_distro)
          | selectattr('os_version', '==', os_version)
          | rejectattr('tags', 'search', 'cluster')
          | sort(attribute='created_at')
          | last }}"
      when: update

    - name: Check image format (qcow2 or raw)
      ansible.builtin.set_fact:
        is_qcow2: "{{ newest_resenv_image.disk_format == 'qcow2' }}"
      when: update

    - name: Ensure /vol directory exists
      ansible.builtin.file:
        path: /vol
        state: directory
        mode: "0755"
      when: update

    # ----------------------------
    # DOWNLOAD ONLY IF RAW
    # ----------------------------
    - name: Download RAW image (only if not qcow2)
      ansible.builtin.command: >
        openstack image save {{ newest_resenv_image.id }}
        --file /vol/{{ newest_resenv_image.id }}.raw
      when:
        - update
        - not is_qcow2

    # ----------------------------
    # CONVERT ONLY IF RAW
    # ----------------------------
    - name: Convert RAW to QCOW2
      ansible.builtin.command: >
        qemu-img convert -f raw -O qcow2
        /vol/{{ newest_resenv_image.id }}.raw
        /vol/{{ newest_resenv_image.id }}.qcow2
      when:
        - update
        - not is_qcow2

    # ----------------------------
    # UPLOAD ONLY IF RAW
    # ----------------------------
    - name: Upload QCOW2 image
      ansible.builtin.command: >
        openstack image create "{{ newest_resenv_image.name }}-qcow2"
        --disk-format qcow2
        --container-format bare
        --file /vol/{{ newest_resenv_image.id }}.qcow2
        --private
      when:
        - update
        - not is_qcow2

    # ----------------------------
    # DELETE OLD RAW ONLY IF CONVERTED
    # ----------------------------
    - name: Delete original RAW image from Glance
      ansible.builtin.command: >
        openstack image delete {{ newest_resenv_image.id }}
      when:
        - update
        - not is_qcow2

    # ----------------------------
    # CLEANUP LOCAL FILES
    # ----------------------------
    - name: Cleanup /vol artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/vol/{{ newest_resenv_image.id }}.raw"
        - "/vol/{{ newest_resenv_image.id }}.qcow2"
      when:
        - update
        - not is_qcow2
