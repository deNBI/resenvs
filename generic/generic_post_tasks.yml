---
- name: POST_TASK Enable unattended upgrades
  become: true
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/10periodic
    regexp: '^APT::Periodic::Unattended-Upgrade'
    line: 'APT::Periodic::Unattended-Upgrade "1";'
    create: true

- name: POST_TASK Unmask apt background timers
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: false
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
  failed_when: false

- name: POST_TASK Enable apt background timers
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
  failed_when: false

- name: POST_TASK Start apt background services
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
  loop:
    - unattended-upgrades.service
    - apt-daily.service
    - apt-daily-upgrade.service
  failed_when: false

- name: POST_TASK Disable fail2ban if present
  become: true
  ansible.builtin.service:
    name: fail2ban
    state: stopped
    enabled: false
  failed_when: false

- name: POST_TASK Clear all SSH public keys from authorized_keys
  become: true
  ansible.builtin.copy:
    content: ""
    dest: "{{ ansible_user_dir }}/.ssh/authorized_keys"
    mode: '0600'
