---
- name: Populate service facts
  ansible.builtin.service_facts:

- name: Wait till Apt_Mirror de.NBI Bielefeld Service is done
  ansible.builtin.service_facts:
  until: services['de.NBI_Bielefeld_environment.service'].state == 'stopped'
  retries: 35
  delay: 10
  when: services['de.NBI_Bielefeld_environment.service'] is defined

- name: PRE_TASK Disable unattended upgrades
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/10periodic
    regexp: ^APT::Periodic::Unattended-Upgrade
    line: APT::Periodic::Unattended-Upgrade "0";
    create: true

- name: PRE_TASK Stop apt-daily services and timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - unattended-upgrades
    - apt-daily
    - apt-daily.timer
    - apt-daily-upgrade
    - apt-daily-upgrade.timer

- name: PRE_TASK Wait for any running apt/dpkg processes to finish
  ansible.builtin.shell: |
    while pgrep -x apt >/dev/null || pgrep -x apt-get >/dev/null; do
      sleep 1
    done
  retries: 20
  delay: 3
  register: apt_wait
  until: apt_wait.rc == 0
  changed_when: false

- name: PRE_TASK Update apt cache and upgrade packages
  become: true
  ansible.builtin.apt:
    upgrade: true
    update_cache: true
    autoremove: true
    autoclean: true

- name: Pip
  ansible.builtin.apt:
    name: python3-pip
    state: latest


- name: Setup Docker
  ansible.builtin.import_tasks: ../generic/setup_docker.yml

- name: PRE_TASK Install Metadata-Service
  ansible.builtin.import_tasks: ../generic/install_metadata_service.yml
